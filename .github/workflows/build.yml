name: build

on:
  push:
  pull_request:
  workflow_dispatch:

jobs:
  build:
    name: build (${{ matrix.target }})
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: ubuntu-latest
            target: linux-x86_64
            built: librtx.so
            artifact: qwprogs.so
          - os: macos-15
            target: macos-arm64
            built: librtx.dylib
            artifact: qwprogs.dylib
          - os: windows-latest
            target: windows-x86_64
            built: rtx.dll
            artifact: qwprogs.dll
    steps:
      - uses: actions/checkout@v5

      - uses: dtolnay/rust-toolchain@stable

      - uses: Swatinem/rust-cache@v2

      - name: Build (release)
        run: cargo build --release --locked

      - name: Stage qwprogs module
        shell: bash
        run: cp "target/release/${{ matrix.built }}" "${{ matrix.artifact }}"

      - name: Upload artifact
        uses: actions/upload-artifact@v5
        with:
          name: qwprogs-${{ matrix.target }}
          path: ${{ matrix.artifact }}
          if-no-files-found: error
