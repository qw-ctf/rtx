name: build

on:
  push:
  pull_request:
  workflow_dispatch:

jobs:
  # The wire protocol and the delta chain are the kind of code where a mistake looks like "the bot
  # plays badly sometimes" rather than a crash, so the suites that pin them need to actually run.
  # The netclient is a default-off feature, so its tests need asking for by name — without this line
  # `cargo test` filters them all out and says ok.
  test:
    name: test
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5
      - uses: dtolnay/rust-toolchain@stable
      - uses: Swatinem/rust-cache@v2
      - name: Test (game module, nav core, wire codec)
        run: cargo test --locked
      - name: Test (network client)
        run: cargo test --locked -p rtx-game --features netclient

  build:
    name: build (${{ matrix.target }})
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: ubuntu-latest
            target: linux-x86_64
            built: librtx.so
            artifact: qwprogs.so
            client: rtx-client
          - os: macos-15
            target: macos-arm64
            built: librtx.dylib
            artifact: qwprogs.dylib
            client: rtx-client
          - os: windows-latest
            target: windows-x86_64
            built: rtx.dll
            artifact: qwprogs.dll
            client: rtx-client.exe
    steps:
      - uses: actions/checkout@v5

      - uses: dtolnay/rust-toolchain@stable

      - uses: Swatinem/rust-cache@v2

      - name: Build qwprogs module (release)
        run: cargo build --release --locked

      # The network client is a default-off feature on its own excluded crate, so it needs building
      # by name — a separate cargo invocation, which leaves the qwprogs module above untouched.
      - name: Build network client (release)
        run: cargo build --release --locked -p rtx-client

      - name: Stage qwprogs module
        shell: bash
        run: cp "target/release/${{ matrix.built }}" "${{ matrix.artifact }}"

      - name: Upload qwprogs artifact
        uses: actions/upload-artifact@v6
        with:
          name: qwprogs-${{ matrix.target }}
          path: ${{ matrix.artifact }}
          if-no-files-found: error

      - name: Upload rtx-client artifact
        uses: actions/upload-artifact@v6
        with:
          name: rtx-client-${{ matrix.target }}
          path: target/release/${{ matrix.client }}
          if-no-files-found: error
