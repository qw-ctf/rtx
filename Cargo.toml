[workspace]
resolver = "2"
members = ["crates/rtx-nav", "crates/rtx-game", "crates/navview", "crates/rjmcp"]
# Plain `cargo build` / `cargo test` build only the game module and its nav core — the viewer
# (and its wgpu/winit tree) and the rjmcp harness bridge (its rmcp/tokio tree) stay out of the
# default build and out of CI. Build them explicitly with `-p navview` / `-p rjmcp`.
default-members = ["crates/rtx-nav", "crates/rtx-game"]

[workspace.package]
version = "0.1.0"
edition = "2021"
license = "AGPL-3.0-or-later"
authors = ["Daniel Svensson <dsvensson@gmail.com>"]

[workspace.dependencies]
# `glam` crosses the rtx-nav public API boundary (Vec3 in Bsp/NavGraph), so every crate must
# resolve the same version — single-source it here.
glam = "0.32"
binrw = "0.15"
bitflags = "2"
rayon = "1"
rtx-nav = { path = "crates/rtx-nav" }
