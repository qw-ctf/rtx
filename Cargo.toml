[package]
name = "rtx"
version = "0.1.0"
edition = "2021"
license = "AGPL-3.0-or-later"
authors = ["Daniel Svensson <dsvensson@gmail.com>"]

[lib]
name = "rtx"
# `rlib` in addition to the engine-loaded `cdylib` so the pure-logic modules (bsp parser,
# navmesh) can be unit-tested with `cargo test`.
crate-type = ["cdylib", "rlib"]

[dependencies]
binrw = "0.15"
bitflags = "2"
glam = "0.32"
